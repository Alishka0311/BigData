services:
  postgres:
    image: postgres:16
    container_name: lr3-postgres
    environment:
      POSTGRES_DB: pet_shop
      POSTGRES_USER: pet_user
      POSTGRES_PASSWORD: pet_password
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pet_user -d pet_shop"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.9.2
    container_name: lr3-kafka
    hostname: kafka
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: CONTROLLER://:29093,PLAINTEXT://:19092,PLAINTEXT_HOST://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:19092,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:19092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12

  jobmanager:
    image: flink:1.20.1-scala_2.12-java17
    container_name: lr3-flink-jobmanager
    command: jobmanager
    ports:
      - "8081:8081"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./flink-job/target:/opt/flink/usrlib

  taskmanager:
    image: flink:1.20.1-scala_2.12-java17
    container_name: lr3-flink-taskmanager
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 4
    depends_on:
      - jobmanager
    volumes:
      - ./flink-job/target:/opt/flink/usrlib

  producer:
    build:
      context: ./producer
    container_name: lr3-producer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      KAFKA_TOPIC: petshop.sales.raw
      DATA_DIR: /data
      SEND_DELAY_MS: 0
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./исходные данные:/data:ro

  flink-build:
    image: maven:3.9.9-eclipse-temurin-17
    working_dir: /workspace
    command: mvn -B -DskipTests package
    volumes:
      - ./flink-job:/workspace

volumes:
  postgres_data:
